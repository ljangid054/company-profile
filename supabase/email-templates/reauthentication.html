<!-- Supabase → Authentication → Email templates → Reauthentication -->
<table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background-color:#09090b;padding:32px 16px;font-family:Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <tr><td align="center">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:520px;background-color:#18181b;border:1px solid rgba(255,255,255,.08);border-radius:16px">
      <tr><td style="padding:28px;text-align:center;border-bottom:1px solid rgba(255,255,255,.06)">
        <img src="{{ .SiteURL }}/images/logo.png" width="112" alt="Somada Hookah" style="display:block;margin:0 auto 12px" />
        <p style="margin:0;font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:#d4a574">Somada Hookah · Security</p>
      </td></tr>
      <tr><td style="padding:28px">
        <h1 style="margin:0 0 12px;font-size:22px;font-weight:600;color:#fafafa">Confirm it’s you</h1>
        <p style="margin:0 0 20px;font-size:15px;line-height:1.6;color:#a1a1aa">Somada Hookah needs you to re-authenticate before a sensitive change. Use the secure link below.</p>
        <table role="presentation" cellspacing="0" cellpadding="0" style="margin:0 0 20px"><tr><td style="border-radius:10px;background:linear-gradient(180deg,#f59e0b,#d97706)">
          <a href="{{ .ConfirmationURL }}" style="display:inline-block;padding:14px 28px;font-size:15px;font-weight:700;color:#0c0a09;text-decoration:none;border-radius:10px">Continue</a>
        </td></tr></table>
        <p style="margin:0;font-size:12px;color:#71717a;word-break:break-all">{{ .ConfirmationURL }}</p>
      </td></tr>
      <tr><td style="padding:20px 28px;border-top:1px solid rgba(255,255,255,.06)"><p style="margin:0;font-size:12px;color:#52525b;text-align:center">If you did not start this action, ignore this email.</p></td></tr>
    </table>
  </td></tr>
</table>
