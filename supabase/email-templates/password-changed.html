<!-- Supabase → Authentication → Email templates → Password changed (notification) -->
<table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background-color:#09090b;padding:32px 16px;font-family:Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <tr><td align="center">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:520px;background-color:#18181b;border:1px solid rgba(255,255,255,.08);border-radius:16px">
      <tr><td style="padding:28px;text-align:center;border-bottom:1px solid rgba(255,255,255,.06)">
        <img src="{{ .SiteURL }}/images/logo.png" width="112" alt="Somada Hookah" style="display:block;margin:0 auto 12px" />
        <p style="margin:0;font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:#d4a574">Somada Hookah</p>
      </td></tr>
      <tr><td style="padding:28px">
        <h1 style="margin:0 0 12px;font-size:22px;font-weight:600;color:#fafafa">Password updated</h1>
        <p style="margin:0 0 20px;font-size:15px;line-height:1.6;color:#a1a1aa">The password for your Somada Hookah account was just changed. If this was you, no further action is needed.</p>
        <p style="margin:0 0 20px;font-size:15px;line-height:1.6;color:#fca5a5">If you did <strong>not</strong> change your password, reset it immediately from the login page and review your Supabase project security.</p>
        <table role="presentation" cellspacing="0" cellpadding="0"><tr><td style="border-radius:10px;border:1px solid rgba(255,255,255,.15)">
          <a href="{{ .SiteURL }}/admin/login" style="display:inline-block;padding:12px 24px;font-size:14px;font-weight:600;color:#fafafa;text-decoration:none">Open admin login</a>
        </td></tr></table>
      </td></tr>
      <tr><td style="padding:20px 28px;border-top:1px solid rgba(255,255,255,.06)"><p style="margin:0;font-size:12px;color:#52525b;text-align:center">Somada Hookah</p></td></tr>
    </table>
  </td></tr>
</table>
